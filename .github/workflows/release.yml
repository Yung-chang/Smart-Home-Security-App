name: Release — Build, Sign & Publish

on:
  push:
    tags:
      - 'v*'            # 觸發：git tag v1.0.0 && git push --tags

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── 1. 取得程式碼 ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 取得完整 git 歷史供版本計算

      # ── 2. Java 環境 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Gradle 快取 ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      # ── 4. Keystore（從 Secret 解碼）────────────────────────────────────────
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p $HOME/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > $HOME/keystore/release.jks

      # ── 5. 設定檔（local.properties）────────────────────────────────────────
      - name: Create local.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > local.properties << EOF
          sdk.dir=$ANDROID_SDK_ROOT
          KEYSTORE_FILE=$HOME/keystore/release.jks
          KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD
          KEY_ALIAS=$KEY_ALIAS
          KEY_PASSWORD=$KEY_PASSWORD
          API_BASE_URL=https://api.smarthome.local/
          MQTT_BROKER_URL=ssl://mqtt.smarthome.local:8883
          WS_BASE_URL=wss://api.smarthome.local/events
          EOF

      # ── 6. Firebase google-services.json ────────────────────────────────────
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 7. 單元測試（失敗即停止）────────────────────────────────────────────
      - name: Run Unit Tests
        run: ./gradlew testReleaseUnitTest --no-daemon

      # ── 8. Lint（Release 版）────────────────────────────────────────────────
      - name: Run Lint
        run: ./gradlew lintRelease --no-daemon

      # ── 9. 打包 Release APK ──────────────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      # ── 10. 打包 Release AAB（Google Play 上架用）───────────────────────────
      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon

      # ── 11. 驗證 APK 簽章 ────────────────────────────────────────────────────
      - name: Verify APK Signature
        run: |
          $ANDROID_SDK_ROOT/build-tools/$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)/apksigner \
            verify --verbose \
            app/build/outputs/apk/release/app-release.apk

      # ── 12. 讀取版本號（從 tag）─────────────────────────────────────────────
      - name: Extract Version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # ── 13. 重新命名 APK / AAB（加上版本號）────────────────────────────────
      - name: Rename Artifacts
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SmartHomeGuardian-${TAG}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/SmartHomeGuardian-${TAG}.aab

      # ── 14. 上傳 Artifacts（供下載）─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeGuardian-${{ steps.version.outputs.tag }}-apk
          path: app/build/outputs/apk/release/SmartHomeGuardian-*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeGuardian-${{ steps.version.outputs.tag }}-aab
          path: app/build/outputs/bundle/release/SmartHomeGuardian-*.aab
          retention-days: 90

      - name: Upload Mapping
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ steps.version.outputs.tag }}
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 365

      # ── 15. 建立 GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SmartHome Guardian ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/SmartHomeGuardian-*.apk
            app/build/outputs/bundle/release/SmartHomeGuardian-*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
