name: Release — Build, Sign & Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # 建立 GitHub Release 必要

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Decode Keystore
        run: |
          mkdir -p $HOME/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/keystore/release.jks

      - name: Create local.properties
        run: |
          KSFILE="$HOME/keystore/release.jks"
          KSPWD="${{ secrets.KEYSTORE_PASSWORD }}"
          ALIAS="${{ secrets.KEY_ALIAS }}"
          KEYPWD="${{ secrets.KEY_PASSWORD }}"
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          printf 'sdk.dir=%s\nKEYSTORE_FILE=%s\nKEYSTORE_PASSWORD=%s\nKEY_ALIAS=%s\nKEY_PASSWORD=%s\nAPI_BASE_URL=https\\://api.smarthome.local/\nMQTT_BROKER_URL=ssl\\://mqtt.smarthome.local\\:8883\nWS_BASE_URL=wss\\://api.smarthome.local/events\n' \
            "$SDK" "$KSFILE" "$KSPWD" "$ALIAS" "$KEYPWD" > local.properties

      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Run Lint
        run: ./gradlew lintRelease --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Verify APK Signature
        continue-on-error: true
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BT=$(ls "$SDK/build-tools" | sort -V | tail -1)
          "$SDK/build-tools/$BT/apksigner" verify --verbose \
            app/build/outputs/apk/release/app-release.apk

      - name: Extract Version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename Artifacts
        run: |
          TAG=${{ steps.version.outputs.tag }}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/SmartHomeGuardian-${TAG}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/SmartHomeGuardian-${TAG}.aab

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeGuardian-${{ steps.version.outputs.tag }}-apk
          path: app/build/outputs/apk/release/SmartHomeGuardian-*.apk
          retention-days: 30

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeGuardian-${{ steps.version.outputs.tag }}-aab
          path: app/build/outputs/bundle/release/SmartHomeGuardian-*.aab
          retention-days: 90

      - name: Upload Mapping
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ steps.version.outputs.tag }}
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 365

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SmartHome Guardian ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            app/build/outputs/apk/release/SmartHomeGuardian-*.apk
            app/build/outputs/bundle/release/SmartHomeGuardian-*.aab
