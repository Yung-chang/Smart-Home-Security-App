name: Release — Build, Sign & Publish

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 修正 Node.js 20 棄用警告

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Fix gradlew line endings & permissions
        run: |
          sed -i 's/\r//' gradlew
          chmod +x gradlew

      - name: Decode Keystore
        run: |
          mkdir -p $HOME/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $HOME/keystore/release.jks
          echo "Keystore size: $(wc -c < $HOME/keystore/release.jks) bytes"

      - name: Create local.properties
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=$SDK"                                          > local.properties
          echo "KEYSTORE_FILE=$HOME/keystore/release.jks"             >> local.properties
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}"   >> local.properties
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"                   >> local.properties
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"             >> local.properties
          echo 'API_BASE_URL=https\://api.smarthome.local/'           >> local.properties
          echo 'MQTT_BROKER_URL=ssl\://mqtt.smarthome.local\:8883'    >> local.properties
          echo 'WS_BASE_URL=wss\://api.smarthome.local/events'        >> local.properties
          echo "--- local.properties preview (masked) ---"
          grep -v PASSWORD local.properties || true

      - name: Create google-services.json
        run: |
          cat > app/google-services.json << 'JSONEOF'
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          JSONEOF

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload Test Reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-failure
          path: app/build/reports/tests/
          retention-days: 3

      - name: Run Lint
        run: ./gradlew lintRelease --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB
        run: ./gradlew bundleRelease --no-daemon

      - name: Verify APK Signature
        continue-on-error: true
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BT=$(ls "$SDK/build-tools" | sort -V | tail -1)
          "$SDK/build-tools/$BT/apksigner" verify --verbose \
            app/build/outputs/apk/release/app-release.apk

      - name: Extract Version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename Artifacts
        run: |
          TAG=${{ steps.version.outputs.tag }}
          mv app/build/outputs/apk/release/app-release.apk \
             "app/build/outputs/apk/release/SmartHomeGuardian-${TAG}.apk"
          mv app/build/outputs/bundle/release/app-release.aab \
             "app/build/outputs/bundle/release/SmartHomeGuardian-${TAG}.aab"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeGuardian-${{ steps.version.outputs.tag }}-apk
          path: app/build/outputs/apk/release/SmartHomeGuardian-*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeGuardian-${{ steps.version.outputs.tag }}-aab
          path: app/build/outputs/bundle/release/SmartHomeGuardian-*.aab
          retention-days: 90

      - name: Upload Mapping
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ steps.version.outputs.tag }}
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 365

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SmartHome Guardian ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            app/build/outputs/apk/release/SmartHomeGuardian-*.apk
            app/build/outputs/bundle/release/SmartHomeGuardian-*.aab
